<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — ICT/HE Dustin Roy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style>
:root{
  --ink:#0F1626; --ink-2:#16213B; --ink-3:#1E2C4D; --line:#2A3860;
  --ict:#5EEAD4; --he:#F4A93B; --text-hi:#F3F6FC; --text-mid:#B9C4DE; --text-dim:#7C88AC;
  --good:#7CE38B; --bad:#FF7A7A;
  --font-display:'Space Grotesk',sans-serif; --font-body:'Plus Jakarta Sans',sans-serif; --font-mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box; margin:0; padding:0;}
body{background:var(--ink); color:var(--text-hi); font-family:var(--font-body); min-height:100vh;}
h1,h2,h3{font-family:var(--font-display);}
button{font-family:inherit; cursor:pointer;}
input,textarea,select{
  font-family:inherit; background:var(--ink); border:1px solid var(--line); color:var(--text-hi);
  border-radius:8px; padding:9px 11px; font-size:13.5px; width:100%;
}
input:focus,textarea:focus,select:focus{outline:2px solid var(--ict);}
label{font-family:var(--font-mono); font-size:10.5px; color:var(--text-dim); text-transform:uppercase; letter-spacing:.04em; display:block; margin-bottom:4px;}
.field{margin-bottom:12px;}
.checkbox-row{display:flex; align-items:center; gap:8px;}
.checkbox-row input{width:auto;}

/* ---------- login ---------- */
#loginScreen{
  min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;
}
.login-box{
  background:var(--ink-2); border:1px solid var(--line); border-radius:18px; padding:34px 30px; width:100%; max-width:360px;
}
.login-box h1{font-size:20px; margin-bottom:4px;}
.login-box .sub{font-family:var(--font-mono); font-size:11px; color:var(--text-dim); margin-bottom:22px;}
.btn{
  font-weight:700; font-size:13.5px; padding:11px 18px; border-radius:10px; border:none; transition:.15s;
}
.btn.primary{background:var(--ict); color:#08201C; width:100%;}
.btn.primary:hover{filter:brightness(1.08);}
.btn.ghost{background:transparent; border:1px solid var(--line); color:var(--text-hi);}
.btn.danger{background:rgba(255,122,122,0.15); color:var(--bad); border:1px solid rgba(255,122,122,0.4);}
#loginError{color:var(--bad); font-size:12.5px; margin-top:10px; display:none;}

/* ---------- app shell ---------- */
#adminApp{display:none; min-height:100vh;}
.topbar{
  display:flex; align-items:center; justify-content:space-between; padding:14px 20px;
  border-bottom:1px solid var(--line); background:var(--ink-2);
}
.topbar .who{font-family:var(--font-mono); font-size:11.5px; color:var(--text-dim);}
.layout{display:flex; min-height:calc(100vh - 60px);}
.sidebar{
  width:220px; flex-shrink:0; border-right:1px solid var(--line); padding:16px 10px; background:var(--ink-2);
}
.side-btn{
  display:flex; align-items:center; gap:10px; width:100%; text-align:left; padding:11px 12px; border-radius:10px;
  background:none; border:none; color:var(--text-mid); font-size:13.5px; font-weight:600; margin-bottom:4px;
}
.side-btn:hover{background:rgba(255,255,255,0.05); color:var(--text-hi);}
.side-btn.active{background:var(--ict); color:#08201C;}
.main{flex:1; padding:26px 30px; overflow-y:auto;}
.main h2{font-size:20px; margin-bottom:4px;}
.main .desc{color:var(--text-dim); font-size:12.5px; margin-bottom:20px;}

.panel-grid{display:grid; grid-template-columns:1fr 340px; gap:22px; align-items:start;}
@media (max-width:860px){ .panel-grid{grid-template-columns:1fr;} .layout{flex-direction:column;} .sidebar{width:100%; display:flex; overflow-x:auto; gap:6px;} }

.row-card{
  background:var(--ink-3); border:1px solid var(--line); border-radius:12px; padding:14px 16px; margin-bottom:10px;
  display:flex; justify-content:space-between; align-items:flex-start; gap:12px;
}
.row-card h4{font-size:14px; margin-bottom:3px;}
.row-card .sub{font-family:var(--font-mono); font-size:10.5px; color:var(--text-dim);}
.row-actions{display:flex; gap:6px; flex-shrink:0;}
.row-actions button{padding:6px 10px; font-size:11.5px; border-radius:7px;}

.form-box{background:var(--ink-2); border:1px solid var(--line); border-radius:14px; padding:18px; position:sticky; top:16px;}
.form-box h3{font-size:14.5px; margin-bottom:14px;}
.form-actions{display:flex; gap:8px; margin-top:6px;}

.toast{
  position:fixed; bottom:20px; right:20px; background:var(--ink-3); border:1px solid var(--ict);
  color:var(--text-hi); padding:12px 18px; border-radius:10px; font-size:13px; display:none; z-index:999;
}
.toast.show{display:block;}
.settings-form .field{max-width:520px;}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="loginScreen">
  <div class="login-box">
    <h1>Adviser Login</h1>
    <div class="sub">ICT/HE — DUSTIN ROY · SITE ADMIN</div>
    <form id="loginForm">
      <div class="field"><label>Email</label><input type="email" id="loginEmail" required></div>
      <div class="field"><label>Password</label><input type="password" id="loginPassword" required></div>
      <button class="btn primary" type="submit">Log In</button>
      <div id="loginError">Incorrect email or password.</div>
    </form>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="adminApp">
  <div class="topbar">
    <strong style="font-family:var(--font-display);">ICT/HE Admin</strong>
    <div style="display:flex; align-items:center; gap:14px;">
      <span class="who" id="whoami"></span>
      <button class="btn ghost" id="logoutBtn">Log out</button>
    </div>
  </div>
  <div class="layout">
    <div class="sidebar" id="sidebar"></div>
    <div class="main" id="main"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
if(typeof SUPABASE_URL === "undefined" || SUPABASE_URL.includes("YOUR_SUPABASE")){
  document.body.innerHTML = `<div style="padding:60px;text-align:center;font-family:sans-serif;color:#fff;background:#0F1626;min-height:100vh;">
    <h2 style="font-family:'Space Grotesk',sans-serif;">Database not connected yet</h2>
    <p style="color:#B9C4DE;margin-top:10px;">Add your Supabase URL and anon key to <b>config.js</b> first, then reload this page.</p></div>`;
  throw new Error("Supabase not configured");
}
const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function toast(msg, isError){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.borderColor = isError ? "var(--bad)" : "var(--ict)";
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), 2600);
}

/* ============================================================
   COLLECTION DEFINITIONS — generic CRUD driven off this config
============================================================ */
const COLLECTIONS = [
  { key:"announcements", label:"Announcements", icon:"📌",
    fields:[
      {name:"category", label:"Category", type:"select", options:["activities","events","reminders"]},
      {name:"title", label:"Title", type:"text"},
      {name:"body", label:"Details", type:"textarea"},
      {name:"date_label", label:"Date label (e.g. Jul 07, Ongoing)", type:"text"},
      {name:"sort_order", label:"Order (lower shows first)", type:"number"},
    ],
    title:r=>r.title, sub:r=>`${r.category} · ${r.date_label||""}` },

  { key:"gallery", label:"Gallery", icon:"📸",
    fields:[
      {name:"caption", label:"Caption", type:"text"},
      {name:"emoji", label:"Emoji (shown if no image URL)", type:"text"},
      {name:"image_url", label:"Image URL (optional — paste a link to a hosted photo)", type:"text"},
      {name:"filter", label:"Category", type:"select", options:["class","events","funny"]},
      {name:"sort_order", label:"Order", type:"number"},
    ],
    title:r=>r.caption, sub:r=>r.filter },

  { key:"students", label:"Students & Officers", icon:"🧑‍🤝‍🧑",
    fields:[
      {name:"name", label:"Full name", type:"text"},
      {name:"init", label:"Initials (for avatar, e.g. AR)", type:"text"},
      {name:"strand", label:"Strand", type:"select", options:["ICT","HE"]},
      {name:"hobby", label:"Hobby", type:"text"},
      {name:"quote", label:"Favorite quote", type:"text"},
      {name:"is_officer", label:"Class officer?", type:"checkbox"},
      {name:"officer_role", label:"Officer role (if applicable)", type:"text"},
      {name:"sort_order", label:"Order", type:"number"},
    ],
    title:r=>r.name, sub:r=> r.is_officer ? `${r.strand} · ${r.officer_role||"Officer"}` : r.strand },

  { key:"subjects", label:"Subjects", icon:"📘",
    fields:[
      {name:"name", label:"Subject name", type:"text"},
      {name:"type", label:"Strand", type:"select", options:["ict","he"]},
      {name:"meta", label:"Schedule / notes", type:"text"},
      {name:"sort_order", label:"Order", type:"number"},
    ],
    title:r=>r.name, sub:r=>r.meta },

  { key:"showcase_items", label:"Showcase", icon:"🛠️",
    fields:[
      {name:"strand", label:"Strand", type:"select", options:["ict","he"]},
      {name:"icon", label:"Emoji icon", type:"text"},
      {name:"title", label:"Title", type:"text"},
      {name:"description", label:"Description", type:"textarea"},
      {name:"sort_order", label:"Order", type:"number"},
    ],
    title:r=>r.title, sub:r=>r.strand },

  { key:"hall_of_fame", label:"Hall of Fame", icon:"🏆",
    fields:[
      {name:"section", label:"Type", type:"select", options:["spotlight","best","achiever","achievement"]},
      {name:"icon", label:"Emoji icon", type:"text"},
      {name:"label", label:"Title / label", type:"text"},
      {name:"who", label:"Student name (if applicable)", type:"text"},
      {name:"description", label:"Description (optional)", type:"textarea"},
      {name:"sort_order", label:"Order", type:"number"},
    ],
    title:r=>r.label, sub:r=>`${r.section}${r.who ? " · "+r.who : ""}` },
];

const SETTINGS_FIELDS = [
  {key:"school_year_tag", label:"School year tag (top of homepage)"},
  {key:"hero_desc", label:"Hero description"},
  {key:"motto", label:"Class motto"},
  {key:"welcome_heading", label:"Welcome heading"},
  {key:"welcome_text", label:"Welcome paragraph"},
  {key:"adviser_name", label:"Adviser name"},
  {key:"adviser_bio", label:"Adviser bio"},
];

let activeKey = "announcements";

/* ============================================================
   AUTH
============================================================ */
async function checkSession(){
  const { data } = await db.auth.getSession();
  if(data.session){
    showApp(data.session.user.email);
  } else {
    document.getElementById("loginScreen").style.display = "flex";
    document.getElementById("adminApp").style.display = "none";
  }
}
document.getElementById("loginForm").addEventListener("submit", async (e)=>{
  e.preventDefault();
  const email = document.getElementById("loginEmail").value.trim();
  const password = document.getElementById("loginPassword").value;
  document.getElementById("loginError").style.display = "none";
  const { data, error } = await db.auth.signInWithPassword({ email, password });
  if(error){
    document.getElementById("loginError").style.display = "block";
    return;
  }
  showApp(data.user.email);
});
document.getElementById("logoutBtn").addEventListener("click", async ()=>{
  await db.auth.signOut();
  document.getElementById("adminApp").style.display = "none";
  document.getElementById("loginScreen").style.display = "flex";
});
function showApp(email){
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("adminApp").style.display = "block";
  document.getElementById("whoami").textContent = email;
  buildSidebar();
  openCollection(activeKey);
}
checkSession();

/* ============================================================
   SIDEBAR
============================================================ */
function buildSidebar(){
  const sidebar = document.getElementById("sidebar");
  sidebar.innerHTML = "";
  COLLECTIONS.forEach(c=>{
    const b = document.createElement("button");
    b.className = "side-btn" + (c.key===activeKey ? " active" : "");
    b.textContent = `${c.icon} ${c.label}`;
    b.addEventListener("click", ()=>openCollection(c.key));
    sidebar.appendChild(b);
  });
  const settingsBtn = document.createElement("button");
  settingsBtn.className = "side-btn" + (activeKey==="site_settings" ? " active" : "");
  settingsBtn.textContent = "✏️ Site Text";
  settingsBtn.addEventListener("click", ()=>openCollection("site_settings"));
  sidebar.appendChild(settingsBtn);
}

function openCollection(key){
  activeKey = key;
  buildSidebar();
  if(key === "site_settings") renderSettingsPanel();
  else renderCollectionPanel(COLLECTIONS.find(c=>c.key===key));
}

/* ============================================================
   GENERIC COLLECTION PANEL (list + add/edit form)
============================================================ */
async function renderCollectionPanel(cfg){
  const main = document.getElementById("main");
  main.innerHTML = `<h2>${cfg.icon} ${cfg.label}</h2><div class="desc">Add, edit, or remove ${cfg.label.toLowerCase()} shown on the public site.</div>
    <div class="panel-grid">
      <div id="listArea">Loading…</div>
      <div class="form-box"><h3 id="formTitle">Add new</h3><form id="entryForm"></form></div>
    </div>`;
  buildForm(cfg, null);
  await refreshList(cfg);
}

function buildForm(cfg, existing){
  const form = document.getElementById("entryForm");
  document.getElementById("formTitle").textContent = existing ? "Edit entry" : "Add new";
  form.innerHTML = "";
  cfg.fields.forEach(f=>{
    const wrap = document.createElement("div");
    wrap.className = "field";
    const val = existing ? (existing[f.name] ?? "") : "";
    if(f.type === "textarea"){
      wrap.innerHTML = `<label>${f.label}</label><textarea name="${f.name}" rows="3">${val}</textarea>`;
    } else if(f.type === "select"){
      wrap.innerHTML = `<label>${f.label}</label><select name="${f.name}">${f.options.map(o=>`<option value="${o}" ${o===val?"selected":""}>${o}</option>`).join("")}</select>`;
    } else if(f.type === "checkbox"){
      wrap.innerHTML = `<div class="checkbox-row"><input type="checkbox" name="${f.name}" ${val?"checked":""}><label style="margin:0;">${f.label}</label></div>`;
    } else if(f.type === "number"){
      wrap.innerHTML = `<label>${f.label}</label><input type="number" name="${f.name}" value="${val}">`;
    } else {
      wrap.innerHTML = `<label>${f.label}</label><input type="text" name="${f.name}" value="${val}">`;
    }
    form.appendChild(wrap);
  });
  const actions = document.createElement("div");
  actions.className = "form-actions";
  actions.innerHTML = `<button type="submit" class="btn primary">${existing ? "Save changes" : "Add"}</button>` +
    (existing ? `<button type="button" class="btn ghost" id="cancelEditBtn">Cancel</button>` : "");
  form.appendChild(actions);

  if(existing){
    document.getElementById("cancelEditBtn").addEventListener("click", ()=>buildForm(cfg, null));
  }
  form.onsubmit = async (e)=>{
    e.preventDefault();
    const payload = {};
    cfg.fields.forEach(f=>{
      if(f.type === "checkbox"){ payload[f.name] = form[f.name].checked; }
      else if(f.type === "number"){ payload[f.name] = form[f.name].value === "" ? 0 : Number(form[f.name].value); }
      else { payload[f.name] = form[f.name].value; }
    });
    let error;
    if(existing){
      ({ error } = await db.from(cfg.key).update(payload).eq("id", existing.id));
    } else {
      ({ error } = await db.from(cfg.key).insert(payload));
    }
    if(error){ toast("Error: " + error.message, true); return; }
    toast(existing ? "Saved." : "Added.");
    buildForm(cfg, null);
    refreshList(cfg);
  };
}

async function refreshList(cfg){
  const listArea = document.getElementById("listArea");
  const { data, error } = await db.from(cfg.key).select("*").order("sort_order", { ascending:true });
  if(error){ listArea.innerHTML = `<div style="color:var(--bad);">Couldn't load: ${error.message}</div>`; return; }
  if(!data || !data.length){ listArea.innerHTML = `<div style="color:var(--text-dim);">Nothing here yet — use the form to add the first one.</div>`; return; }
  listArea.innerHTML = "";
  data.forEach(row=>{
    const el = document.createElement("div");
    el.className = "row-card";
    el.innerHTML = `<div><h4>${cfg.title(row) || "(untitled)"}</h4><div class="sub">${cfg.sub(row) || ""}</div></div>
      <div class="row-actions">
        <button class="btn ghost" data-act="edit">Edit</button>
        <button class="btn danger" data-act="del">Delete</button>
      </div>`;
    el.querySelector('[data-act="edit"]').addEventListener("click", ()=>{
      buildForm(cfg, row);
      window.scrollTo({top:0, behavior:"smooth"});
    });
    el.querySelector('[data-act="del"]').addEventListener("click", async ()=>{
      if(!confirm("Delete this entry? This can't be undone.")) return;
      const { error } = await db.from(cfg.key).delete().eq("id", row.id);
      if(error){ toast("Error: " + error.message, true); return; }
      toast("Deleted.");
      refreshList(cfg);
    });
    listArea.appendChild(el);
  });
}

/* ============================================================
   SITE TEXT (site_settings) — fixed keys, edit-only
============================================================ */
async function renderSettingsPanel(){
  const main = document.getElementById("main");
  main.innerHTML = `<h2>✏️ Site Text</h2><div class="desc">Edit the wording that appears on the homepage and adviser card.</div>
    <div class="form-box settings-form" style="max-width:560px;"><form id="settingsForm"></form></div>`;
  const { data, error } = await db.from("site_settings").select("*");
  const map = {};
  (data||[]).forEach(r=>map[r.key]=r.value);
  const form = document.getElementById("settingsForm");
  SETTINGS_FIELDS.forEach(f=>{
    const wrap = document.createElement("div");
    wrap.className = "field";
    const isLong = (f.key === "welcome_text" || f.key === "hero_desc" || f.key === "adviser_bio");
    wrap.innerHTML = isLong
      ? `<label>${f.label}</label><textarea name="${f.key}" rows="3">${map[f.key]||""}</textarea>`
      : `<label>${f.label}</label><input type="text" name="${f.key}" value="${map[f.key]||""}">`;
    form.appendChild(wrap);
  });
  const actions = document.createElement("div");
  actions.className = "form-actions";
  actions.innerHTML = `<button type="submit" class="btn primary">Save changes</button>`;
  form.appendChild(actions);
  form.onsubmit = async (e)=>{
    e.preventDefault();
    const rows = SETTINGS_FIELDS.map(f=>({ key:f.key, value: form[f.key].value }));
    const { error } = await db.from("site_settings").upsert(rows, { onConflict:"key" });
    if(error){ toast("Error: " + error.message, true); return; }
    toast("Site text updated.");
  };
  if(error) toast("Couldn't load settings: " + error.message, true);
}
</script>
</body>
</html>
